name: security-scan

# Eats own dogfood: textleaks runs in its own CI via the same stack it
# documents for other repos. Calls the reusable workflow at
# creatornader/oss-security-scan for typos + gitleaks + trufflehog +
# osv-scanner. Also runs textleaks against itself via pre-commit.
#
# All run: blocks use no github.event.* inputs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  scan:
    uses: creatornader/oss-security-scan/.github/workflows/oss-security-scan.yml@v0.1.1
    with:
      run-osv-scanner: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

  self-scan:
    name: textleaks scan (self-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e .
      - name: Scan
        run: textleaks scan
